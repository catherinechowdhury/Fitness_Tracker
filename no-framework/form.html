<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Class Project</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <script src="https://kit.fontawesome.com/752d10bc86.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
     <nav class="navbar is-danger" role="navigation" aria-label="main navigation">
        <div class="navbar-brand"><span class="icon"><i class="fas fa-home"></i></span></div>
        <div class="navbar-menu">
            <!-- Navbar Start -->
            <div class="navbar-start">
                <a href="index.html" class="navbar-item">Home</a>  
            </div>

     </nav>

    
    <div class="columns is-centered">
        <div class="column is-half">
            <div class="box">
                <h3 class="title is-3">Add a Title at some point</h3>
                <p class="subtitle is-4">Something goes here</p>

                <div class="box">
                    <h3 class="title is-3">Contact Us</h3>
                    <p class="subtitle is-4">Fill out the form to get in touch with us!</p>
                </div>

                 <div class="field">
                    <label class="label">Name</label>
                    <div class="control">
                        <input class="input" type="text" placeholder="Text input">
                    </div>
                </div>

                <div class="field">
                    <label class="label">Username</label>
                    <div class="control has-icons-left has-icons-right">
                        <input class="input is-success" type="text" placeholder="Text input" value="change this at some point">
                        <span class="icon is-small is-left">
                        <i class="fas fa-user"></i>
                        </span>
                        <span class="icon is-small is-right">
                        <i class="fas fa-check"></i>
                        </span>
                    </div>
                    <p class="help is-success">This username is available</p>
                </div>

                <div class="field">
                    <label class="label">Email</label>
                    <div class="control has-icons-left has-icons-right">
                        <input class="input is-danger" type="email" placeholder="Email input" value="also change this too">
                        <span class="icon is-small is-left">
                        <i class="fas fa-envelope"></i>
                        </span>
                        <span class="icon is-small is-right">
                        <i class="fas fa-exclamation-triangle"></i>
                        </span>

                    </div>
                    <p class="help is-danger">This email is invalid</p>
                    </div>
               
                    <div class="field">
                    <div class="control">
                        <label class="checkbox">
                        <input type="checkbox">
                        I agree to the <a href="#">terms and conditions</a>
                        </label>
                    </div>
                    </div>

                    <div class="field">
                    <div class="control">
                        <label class="radio">
                        <input type="radio" name="question">
                        Yes
                        </label>
                        <label class="radio">
                        <input type="radio" name="question">
                        No
                        </label>
                    </div>
            </div>

            <div class="field is-grouped">
                <div class="control">
                    <button class="button is-link">Submit</button>
                </div>
                <div class="control">
                    <button class="button is-link is-light">Cancel</button>
                </div>
            </div>
    </div>
                
   

</body>
</html>
